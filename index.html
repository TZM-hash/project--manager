<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目管理系统 WEB 入口</title>
  <style>
    :root {
      --app-bg: #f3f6fb;
      --app-surface: #ffffff;
      --app-text: #111827;
      --app-text-soft: #334155;
      --app-muted: #64748b;
      --app-border: #dfe7f1;
      --app-primary: #2563eb;
      --app-primary-hover: #1d4ed8;
      --app-primary-soft: #eaf1ff;
      --app-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
      --app-radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(180deg, #eef4ff 0, rgba(238, 244, 255, 0) 260px),
        var(--app-bg);
      color: var(--app-text);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 0;
    }

    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .entry-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .entry-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      font-weight: 800;
    }

    .entry-brand-mark {
      display: inline-grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: var(--app-radius);
      background: var(--app-primary);
      color: #fff;
      font-size: 13px;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.22;
      font-weight: 850;
    }

    p {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--app-muted);
      line-height: 1.7;
    }

    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .entry-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 11px;
      border: 1px solid var(--app-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--app-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .entry-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .entry-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 176px;
      padding: 20px;
      border: 1px solid var(--app-border);
      border-radius: var(--app-radius);
      background: rgba(255, 255, 255, 0.95);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--app-shadow);
      transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }

    .entry-card:focus,
    .entry-card:hover {
      border-color: rgba(37, 99, 235, 0.55);
      outline: none;
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.11);
    }

    .entry-title {
      color: var(--app-text);
      font-size: 18px;
      font-weight: 800;
    }

    .entry-desc {
      flex: 1;
      color: var(--app-muted);
      line-height: 1.65;
    }

    .entry-action {
      display: inline-flex;
      width: fit-content;
      min-height: 36px;
      align-items: center;
      padding: 7px 12px;
      border-radius: 6px;
      background: var(--app-primary-soft);
      color: var(--app-primary-hover);
      font-weight: 800;
    }

    .address {
      margin-top: 18px;
      padding: 13px 15px;
      border: 1px solid var(--app-border);
      border-radius: var(--app-radius);
      background: rgba(255, 255, 255, 0.82);
      color: var(--app-muted);
      font-family: Consolas, "Courier New", monospace;
      overflow-wrap: anywhere;
    }

    @media (max-width: 720px) {
      main {
        padding: 32px 0;
      }

      .entry-header {
        display: block;
      }

      .entry-meta {
        justify-content: flex-start;
        margin-top: 16px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="entry-header">
      <div>
        <div class="entry-brand">
          <span class="entry-brand-mark">PM</span>
          <span>项目管理系统</span>
        </div>
        <h1>项目管理系统 WEB 入口</h1>
        <p>公司内网项目、请购、月结和未结案报表统一入口。请先启动 ASP.NET Core 服务，再从这里进入系统。</p>
      </div>
      <div class="entry-meta" aria-label="系统信息">
        <span>内网部署</span>
        <span>WEB 工作台</span>
      </div>
    </header>

    <section class="entry-panel" aria-label="系统入口">
      <a class="entry-card" href="http://localhost:62382/Workbench/Projects">
        <span class="entry-title">WEB 工作台</span>
        <span class="entry-desc">项目人员和领导日常查看项目、更新进度、查看状态图。</span>
        <span class="entry-action">打开工作台</span>
      </a>
      <a class="entry-card" href="http://localhost:62382/Admin/Projects">
        <span class="entry-title">后台管理</span>
        <span class="entry-desc">管理员维护项目资料、用户、状态样式和请购记录。</span>
        <span class="entry-action">打开后台</span>
      </a>
      <a class="entry-card" href="http://localhost:62382/Identity/Account/Login">
        <span class="entry-title">登录系统</span>
        <span class="entry-desc">使用公司内网账号登录。默认管理员账号为 admin。</span>
        <span class="entry-action">前往登录</span>
      </a>
    </section>

    <div class="address">本地服务地址：http://localhost:62382/</div>
  </main>
</body>
</html>
