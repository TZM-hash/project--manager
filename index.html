<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="1; url=http://0.0.0.0:62383/">
  <title>專案管理系統 WEB 入口</title>
  <style>
    :root {
      --app-bg: #eef3fb;
      --app-surface: #ffffff;
      --app-text: #0f172a;
      --app-text-soft: #334155;
      --app-muted: #64748b;
      --app-border: #dfe7f1;
      --app-primary: #2563eb;
      --app-primary-hover: #1d4ed8;
      --app-primary-soft: #eaf1ff;
      --app-accent: #14b8a6;
      --app-tech-gradient: linear-gradient(135deg, #2563eb 0%, #0ea5e9 45%, #14b8a6 100%);
      --app-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
      --app-radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      position: relative;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(1100px 480px at 80% -10%, rgba(14, 165, 233, 0.12), transparent 60%),
        radial-gradient(900px 460px at 6% 0%, rgba(37, 99, 235, 0.1), transparent 58%),
        var(--app-bg);
      color: var(--app-text);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      font-size: 15px;
    }

    /* 动态科技背景层 */
    .bg-fx {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-fx::before {
      content: "";
      position: absolute;
      inset: -2px;
      background-image:
        linear-gradient(rgba(37, 99, 235, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.06) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(ellipse 120% 80% at 50% -10%, #000 30%, transparent 78%);
      -webkit-mask-image: radial-gradient(ellipse 120% 80% at 50% -10%, #000 30%, transparent 78%);
      animation: grid-drift 60s linear infinite;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(64px);
      opacity: 0.55;
    }

    .bg-orb-1 {
      top: -8rem;
      left: 10%;
      width: 26rem;
      height: 26rem;
      background: radial-gradient(circle at 30% 30%, rgba(37, 99, 235, 0.34), transparent 68%);
      animation: orb-a 22s ease-in-out infinite;
    }

    .bg-orb-2 {
      top: 24%;
      right: -6rem;
      width: 22rem;
      height: 22rem;
      background: radial-gradient(circle at 60% 40%, rgba(20, 184, 166, 0.28), transparent 68%);
      animation: orb-b 27s ease-in-out infinite;
    }

    @keyframes grid-drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-46px, -46px, 0); }
    }

    @keyframes orb-a {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(2.5rem, 2rem) scale(1.08); }
    }

    @keyframes orb-b {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-2rem, 2.5rem) scale(1.1); }
    }

    main {
      position: relative;
      z-index: 1;
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
      animation: fade-up 0.6s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .entry-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .entry-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      font-weight: 800;
    }

    .entry-brand-mark {
      position: relative;
      display: inline-grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border-radius: 10px;
      background: var(--app-tech-gradient);
      background-size: 160% 160%;
      color: #fff;
      font-size: 13px;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
      animation: mark-shift 5s ease infinite;
    }

    @keyframes mark-shift {
      0%, 100% { background-position: 0% 0; }
      50% { background-position: 100% 0; }
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.22;
      font-weight: 850;
    }

    p {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--app-muted);
      line-height: 1.7;
    }

    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .entry-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 12px;
      border: 1px solid rgba(37, 99, 235, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(8px);
      color: var(--app-text-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .entry-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      perspective: 1200px;
    }

    .entry-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 176px;
      padding: 22px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--app-radius);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      color: inherit;
      text-decoration: none;
      transform-style: preserve-3d;
      box-shadow: var(--app-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      transition: border-color 0.3s ease, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s ease;
    }

    .entry-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: var(--app-tech-gradient);
      opacity: 0.85;
    }

    .entry-card:focus,
    .entry-card:hover {
      border-color: rgba(37, 99, 235, 0.32);
      outline: none;
      transform: perspective(1200px) rotateX(6deg) translateY(-6px) scale(1.03);
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.12), 0 28px 60px rgba(37, 99, 235, 0.22);
    }

    .entry-title {
      color: var(--app-text);
      font-size: 18px;
      font-weight: 800;
    }

    .entry-desc {
      flex: 1;
      color: var(--app-muted);
      line-height: 1.65;
    }

    .entry-action {
      display: inline-flex;
      width: fit-content;
      min-height: 36px;
      align-items: center;
      padding: 7px 13px;
      border-radius: 8px;
      background: var(--app-primary-soft);
      color: var(--app-primary-hover);
      font-weight: 800;
    }

    .address {
      margin-top: 18px;
      padding: 13px 15px;
      border: 1px solid rgba(37, 99, 235, 0.14);
      border-radius: var(--app-radius);
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(8px);
      color: var(--app-muted);
      font-family: Consolas, "Courier New", monospace;
      overflow-wrap: anywhere;
    }

    .direct-entry {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding: 15px 17px;
      border: 1px solid rgba(37, 99, 235, 0.22);
      border-radius: var(--app-radius);
      background: rgba(234, 241, 255, 0.7);
      backdrop-filter: blur(8px);
      color: var(--app-text-soft);
      box-shadow: var(--app-shadow);
    }

    .direct-entry strong {
      color: var(--app-text);
    }

    .loading-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 8px;
      border-radius: 50%;
      background: var(--app-accent);
      box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.5);
      animation: pulse-dot 1.4s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes pulse-dot {
      0% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.5); }
      70% { box-shadow: 0 0 0 10px rgba(20, 184, 166, 0); }
      100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
    }

    .direct-entry a {
      position: relative;
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      overflow: hidden;
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--app-tech-gradient);
      background-size: 160% 160%;
      color: #fff;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
      transition: transform 0.15s ease, box-shadow 0.25s ease, background-position 0.5s ease;
    }

    .direct-entry a:hover {
      transform: translateY(-1px);
      background-position: 100% 0;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.36);
    }

    @media (max-width: 720px) {
      main {
        padding: 32px 0;
      }

      .entry-header {
        display: block;
      }

      .entry-meta {
        justify-content: flex-start;
        margin-top: 16px;
      }

      h1 {
        font-size: 26px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-fx::before,
      .bg-orb,
      .entry-brand-mark,
      .direct-entry a,
      main,
      .loading-dot {
        animation: none !important;
      }

      .entry-card,
      .entry-card:hover,
      .entry-card:focus {
        transform: none !important;
        transition: none !important;
      }
    }
  </style>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      var appUrl = "http://0.0.0.0:62383/";
      var link = document.querySelector("[data-app-link]");
      if (link) {
        link.href = appUrl;
      }

      window.setTimeout(function () {
        window.location.replace(appUrl);
      }, 350);
    });
  </script>
</head>
<body>
  <div class="bg-fx" aria-hidden="true">
    <span class="bg-orb bg-orb-1"></span>
    <span class="bg-orb bg-orb-2"></span>
  </div>
  <main>
    <header class="entry-header">
      <div>
        <div class="entry-brand">
          <span class="entry-brand-mark">PM</span>
          <span>專案管理系統</span>
        </div>
        <h1>專案管理系統 WEB 入口</h1>
        <p>公司內網專案、請購、月結和未結案報表統一入口。請先啟動 ASP.NET Core 服務，再從這裡進入系統。</p>
      </div>
      <div class="entry-meta" aria-label="系統資訊">
        <span>內網部署</span>
        <span>WEB 工作台</span>
      </div>
    </header>

    <div class="direct-entry">
      <div><span class="loading-dot"></span><strong>正在進入系統...</strong> 如果沒有自動跳轉，請點擊右側按鈕。</div>
      <a data-app-link href="http://0.0.0.0:62383/">打開系統</a>
    </div>

    <section class="entry-panel" aria-label="系統入口">
      <a class="entry-card" href="http://0.0.0.0:62383/Workbench/Projects">
        <span class="entry-title">WEB 工作台</span>
        <span class="entry-desc">專案人員和領導日常查看專案、更新進度、查看狀態圖。</span>
        <span class="entry-action">打開工作台</span>
      </a>
      <a class="entry-card" href="http://0.0.0.0:62383/Admin/Projects">
        <span class="entry-title">後台管理</span>
        <span class="entry-desc">管理員維護專案資料、使用者、狀態樣式和請購記錄。</span>
        <span class="entry-action">打開後台</span>
      </a>
      <a class="entry-card" href="http://0.0.0.0:62383/Identity/Account/Login">
        <span class="entry-title">登入系統</span>
        <span class="entry-desc">使用公司內網帳號登入。預設管理員帳號為 admin。</span>
        <span class="entry-action">前往登入</span>
      </a>
    </section>

    <div class="address">本機服務位址：http://0.0.0.0:62383/</div>
  </main>
</body>
</html>
